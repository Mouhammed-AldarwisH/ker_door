<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الاستراحة">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/553/553376.png">
    <link rel="manifest" href="manifest.json">
    
    <title>مراقبة الاستراحة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px; 
            margin: 0;
            direction: rtl; 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 20px auto; }
        
        /* تنسيق الهيدر وزر التحديث */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h2 { margin: 0; font-size: 24px; font-weight: 700; }
        .btn-refresh {
            background: #e5e5ea;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            padding: 0;
            flex: none; /* لمنع الزر من التمدد */
        }
        .btn-refresh:active { background: #d1d1d6; }
        
        .status-card { 
            padding: 20px; 
            border-radius: 14px; 
            margin-bottom: 16px; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 600; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            background: var(--card-bg);
            border: 2px solid transparent;
        }
        .online { color: var(--success); border-color: #e5f9e7; background: #f4fdf5; }
        .offline { color: var(--danger); border-color: #ffe8e7; background: #fff5f5;}
        .door-open { color: #d97706; border-color: #fef3c7; background: #fffcf0; }
        .door-closed { color: var(--primary); border-color: #e0f2fe; background: #f0f9ff;}
        
        .section-title { font-size: 20px; font-weight: 700; margin: 30px 0 15px; }
        .list-container {
            background: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            padding: 16px; 
            border-bottom: 1px solid #e5e5ea; 
            font-size: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        li:last-child { border-bottom: none; }
        .time { color: var(--text-muted); font-size: 13px; }
        .hidden { display: none; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        button {
            flex: 1; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        .btn-door { background: var(--primary); color: white; }
        .btn-power { background: var(--success); color: white; }
        .btn-notify { 
            width: 100%; 
            background: #ffcc00; 
            color: black; 
            margin-top: 20px; 
            display: none; 
        }
        
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table td { 
            padding: 16px; 
            border-bottom: 1px solid #e5e5ea; 
            text-align: right; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>نظام الاستراحة</h2>
        <button class="btn-refresh" onclick="location.reload()" aria-label="تحديث الصفحة">🔄</button>
    </div>

    <div id="power-status" class="status-card">جاري جلب حالة الكهرباء...</div>
    <div id="door-status" class="status-card">جاري جلب حالة الباب...</div>

    <div class="btn-group">
        <button class="btn-door" onclick="viewFullHistory('door')">سجل الباب 🚪</button>
        <button class="btn-power" onclick="viewFullHistory('power')">سجل الكهرباء ⚡</button>
    </div>

    <div id="history-section" class="hidden">
        <h3 id="history-title" class="section-title">السجل الكامل</h3>
        <div class="list-container" style="max-height: 400px; overflow-y: auto;">
            <table class="history-table">
                <tbody id="history-table-body"></tbody>
            </table>
        </div>
    </div>

    <h3 class="section-title">آخر الأحداث</h3>
    <div class="list-container">
        <ul id="events-list">
            <li>جاري تحميل السجل السريع...</li>
        </ul>
    </div>

    <button id="notify-btn" class="btn-notify" onclick="requestNotificationPermission()">
        تفعيل إشعارات التنبيه 🔔
    </button>
</div>

<script src="app.js"></script>
</body>
</html>
