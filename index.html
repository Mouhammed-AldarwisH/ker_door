<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراقبة الاستراحة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f4f9; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-card { padding: 20px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .online { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .offline { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .door-open { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .door-closed { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 25px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; display: flex; justify-content: space-between; }
        .time { color: #666; font-size: 12px; }
        .hidden { display: none; }
        
        /* تنسيقات أزرار التصفح والجدول */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-nav { flex: 1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .btn-nav:hover { background: #0056b3; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        .history-table th, .history-table td { padding: 12px; border: 1px solid #ddd; text-align: right; font-size: 14px; }
        .history-table th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 25px;">نظام مراقبة الاستراحة</h2>

    <div id="power-status" class="status-card">جاري جلب حالة الكهرباء...</div>
    <div id="door-status" class="status-card">جاري جلب حالة الباب...</div>

    <div class="btn-group">
        <button class="btn-nav" onclick="viewFullHistory('door')">سجل حركة الباب الكامل</button>
        <button class="btn-nav" onclick="viewFullHistory('power')" style="background: #28a745;">سجل حالات الكهرباء الكامل</button>
    </div>

    <div id="history-section" class="hidden">
        <h3 id="history-title">السجل التاريخي الكامل</h3>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>الحدث أو الحالة</th>
                        <th>التوقيت والتاريخ</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <h3>آخر 5 أحداث تلقائية</h3>
    <ul id="events-list">
        <li>جاري تحميل السجل السريع...</li>
    </ul>
</div>
<div class="btn-group">
        <button class="btn-nav" onclick="viewFullHistory('door')">سجل حركة الباب الكامل</button>
        <button class="btn-nav" onclick="viewFullHistory('power')" style="background: #28a745;">سجل حالات الكهرباء الكامل</button>
    </div>

    <button id="notify-btn" onclick="requestNotificationPermission()" style="width: 100%; padding: 12px; background: #ffc107; color: black; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 15px; display: none;">
        تفعيل الإشعارات 🔔
    </button>
<script src="app.js"></script>
</body>
</html>
